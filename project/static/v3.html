<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>On-Call Agent</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
    header{background:#1a73e8;color:#fff;padding:12px 20px;font-size:1.1rem;font-weight:600}
    header span{font-size:.8rem;font-weight:400;margin-left:8px;opacity:.8}
    #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:75%;padding:10px 14px;border-radius:12px;line-height:1.6;font-size:.9rem;white-space:pre-wrap;word-break:break-word}
    .user{align-self:flex-end;background:#1a73e8;color:#fff;border-radius:12px 12px 2px 12px}
    .assistant{align-self:flex-start;background:#fff;border:1px solid #e0e0e0;border-radius:12px 12px 12px 2px}
    .tool-status{align-self:flex-start;font-size:.82rem;color:#666;background:#f0f4ff;border:1px solid #d0dcff;border-radius:8px;padding:6px 12px;display:flex;flex-direction:column;gap:3px}
    .tool-status .step{display:flex;align-items:center;gap:6px}
    .candidates{align-self:flex-start;display:flex;flex-wrap:wrap;gap:8px;max-width:75%}
    .candidates button{padding:8px 14px;border:1px solid #1a73e8;border-radius:20px;background:#fff;color:#1a73e8;cursor:pointer;font-size:.88rem;transition:all .15s}
    .candidates button:hover{background:#1a73e8;color:#fff}
    #input-row{display:flex;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0}
    #input-row input{flex:1;padding:10px 14px;border:1px solid #ccc;border-radius:24px;font-size:.95rem;outline:none}
    #input-row input:focus{border-color:#1a73e8}
    #input-row button{padding:10px 20px;background:#1a73e8;color:#fff;border:none;border-radius:24px;cursor:pointer;font-size:.95rem}
    #input-row button:disabled{background:#aaa;cursor:default}
    .thinking{color:#aaa;font-style:italic;font-size:.85rem}
  </style>
</head>
<body>
<header>On-Call 助手 <span>Phase 3 · Agent</span></header>
<div id="chat"></div>
<div id="input-row">
  <input id="q" placeholder="描述你遇到的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}">
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('q');
const sendBtn = document.getElementById('sendBtn');
let history = [];
let sessionId = Math.random().toString(36).slice(2);

function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addToolStatus() {
  const div = document.createElement('div');
  div.className = 'tool-status';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addStep(container, icon, text) {
  const step = document.createElement('div');
  step.className = 'step';
  step.innerHTML = `<span>${icon}</span><span>${text}</span>`;
  container.appendChild(step);
  chat.scrollTop = chat.scrollHeight;
}

function showCandidates(candidates) {
  const div = document.createElement('div');
  div.className = 'candidates';
  candidates.forEach(c => {
    const btn = document.createElement('button');
    btn.textContent = `${c.icon} ${c.label}`;
    btn.title = c.hint || '';
    btn.onclick = () => {
      div.remove();
      sendMessage(c.label);
    };
    div.appendChild(btn);
  });
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(text) {
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  sendBtn.disabled = true;

  let toolBox = null;
  let assistantDiv = null;

  try {
    const resp = await fetch('/v3/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId, history: history.slice(0, -1) }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { continue; }

        if (data.type === 'tool_call') {
          if (!toolBox) {
            toolBox = addToolStatus();
            addStep(toolBox, '🔍', '分析问题中...');
          }
          addStep(toolBox, '📄', `正在读取 ${data.fname}`);
        }
        if (data.type === 'answer') {
          if (toolBox) addStep(toolBox, '✅', '找到相关内容，生成回答...');
          assistantDiv = addMsg('assistant', data.message);
          history.push({ role: 'assistant', content: data.message });
        }
        if (data.type === 'clarification') {
          addMsg('assistant', data.message || '你的问题可能涉及几个方向，请选择：');
          showCandidates(data.candidates || []);
        }
        if (data.type === 'done') {
          // stream ended
        }
      }
    }
  } catch (e) {
    addMsg('assistant', '出错了：' + e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

function send() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  input.value = '';
  sendMessage(text);
}
</script>
</body>
</html>
